<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
</head>
<body>
    <div class="formulario" >
        <div class="round">
            <img class="logo" src="../public/logo.png" alt="Logo">
        </div>
        <div class="wrap-input-label">
        <label for="Nome">Nome</label>
        <input type="text" id="nome" placeholder="Insira o seu nome">
        </div>

        <div class="wrap-input-label">
        <label for="Senha">Senha</label>
        <input type="password" id="senha" placeholder="Insira sua senha"> 
        </div onclick="showPassword()">
             <img src="../../public/olho.png" alt="Senha" id="eye" class="eye" width="25px">
        </div>
    </div>

    <button>Login</button>

    <div class="error-div" id="error-modal">
        <h3>credencia incorretas</h3>
        <button onclick="fecharError()">❌</button>
    </div>
    <script src="style.js"></script>
</body>
</html>
